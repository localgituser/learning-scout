name: Learning Scout

on:
  schedule:
    - cron: "0 22 * * 0"   # Sunday 22:00 UTC = Monday 08:00 Melbourne AEDT
  workflow_dispatch:         # allow manual trigger from Actions UI

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -x -q

      - name: Write config
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: echo "$CONFIG_YAML" > config.yaml

      - name: Run Learning Scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_API_SECRET: ${{ secrets.CF_API_SECRET }}
        run: python -m learning_scout.main
